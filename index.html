<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DDU Admission Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

/* HEADER */
.header {
    background:#f04e2a;
    color:white;
    padding:10px;
    display:flex;
    align-items:center;
}
.logo {
    width:45px;
    height:45px;
    background:black;
    color:white;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
    font-size:20px;
}
.header h2 { margin:0; }

/* NAV */
nav {
    background:#222;
    padding:10px;
    text-align:center;
}
nav a {
    color:white;
    margin:10px;
    text-decoration:none;
    cursor:pointer;
}

/* SECTIONS */
section { display:none; padding:20px; }
.active { display:block; }

.container {
    background:white;
    padding:20px;
    border-radius:10px;
}

/* FORM */
input, select {
    padding:10px;
    margin:5px;
    width:230px;
}

button, input[type=submit] {
    background:#f04e2a;
    color:white;
    border:none;
    padding:10px;
    margin:5px;
}

/* LAB */
.lab {
    border-top:1px solid #ccc;
    padding:10px 0;
    color:#f04e2a;
}

/* TAG */
.tag {
    background:#f04e2a;
    color:white;
    padding:6px 10px;
    display:inline-block;
}
</style>

<script>
function showPage(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function submitForm(e){
    e.preventDefault();
    let name = document.getElementById("name").value;
    document.getElementById("welcome").innerText = "Welcome " + name;
    showPage('branchPage');
}

function showBranch(branch){
    showPage('details');

    let data = {
IT: `<h3>Information Technology</h3>
<div class="lab">Programming Lab</div>
<div class="lab">Advanced Lab</div>
<div class="lab">IoT Lab</div>
<img src="https://images.unsplash.com/photo-1581092335397-9583eb92d232" width="100%">
<div class="tag">Faculty Members</div>
<p>IT branch focuses on software, AI and placement.</p>
<div><b>Seats:</b>150 | <b>Placement:</b>90% | <b>Package:</b>6 LPA</div>`,

CE: `<h3>Computer Engineering</h3>
<div class="lab">DS Lab</div>
<div class="lab">AI Lab</div>
<img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c" width="100%">
<div class="tag">Faculty Members</div>
<p>CE focuses on programming and ML.</p>
<div><b>Seats:</b>180 | <b>Placement:</b>92%</div>`,

Mechanical: `<h3>Mechanical</h3>
<div class="lab">Thermo Lab</div>
<img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc" width="100%">
<p>Mechanical deals with machines.</p>`,

Civil: `<h3>Civil</h3>
<div class="lab">Structure Lab</div>
<img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e" width="100%">
<p>Civil deals with construction.</p>`
};

    document.getElementById("branchTitle").innerText = branch;
    document.getElementById("branchDesc").innerHTML = data[branch];
}
</script>
</head>

<body onload="showPage('home')">

<!-- HEADER -->
<div class="header">
<div class="logo">DDU</div>
<h2>Dharmsinh Desai University</h2>
</div>

<!-- NAV -->
<nav>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('branchPage')">Admissions</a>
<a onclick="showPage('contact')">Contact</a>
</nav>

<!-- HOME -->
<section id="home">
<div class="container">

<h2>Student Registration Form</h2>

<form onsubmit="submitForm(event)">

<input id="name" type="text" placeholder="Full Name" required><br>
<input type="email" placeholder="Email" required><br>
<input type="tel" placeholder="Mobile Number" required><br>

<input type="date" required><br>

<select required>
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select><br>

<select required>
<option value="">Select Branch</option>
<option>IT</option>
<option>CE</option>
<option>Mechanical</option>
<option>Civil</option>
</select><br>

<input type="text" placeholder="City" required><br>
<input type="text" placeholder="State" required><br>

<input type="submit" value="Register">

</form>

</div>
</section>

<!-- BRANCH -->
<section id="branchPage">
<div class="container">
<h2 id="welcome"></h2>

<button onclick="showBranch('IT')">IT</button>
<button onclick="showBranch('CE')">CE</button>
<button onclick="showBranch('Mechanical')">Mechanical</button>
<button onclick="showBranch('Civil')">Civil</button>
</div>
</section>

<!-- DETAILS -->
<section id="details">
<div class="container">
<h2 id="branchTitle"></h2>
<div id="branchDesc"></div>
<button onclick="showPage('branchPage')">Back</button>
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<div class="container">
<h2>Contact</h2>
<p>Dharmsinh Desai University, Nadiad</p>
<p>Email: info@ddu.ac.in</p>
</div>
</section>

</body>
</html>
