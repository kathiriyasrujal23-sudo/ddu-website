<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DDU Info Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f4f4;
}

nav {
    background: #ff6a00;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-weight: bold;
}

section { display: none; padding: 30px; }
.active { display: block; }

.container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 85%;
    margin: auto;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1, h2 {
    color: #ff6a00;
}

input, select, textarea {
    padding: 10px;
    margin: 6px;
    width: 240px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

input[type="submit"] {
    background: #ff6a00;
    color: white;
    border: none;
    cursor: pointer;
}

button {
    padding: 10px;
    margin: 6px;
    background: #ff6a00;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.info-box {
    background: #fff7f0;
    padding: 15px;
    border-left: 5px solid #ff6a00;
    border-radius: 8px;
    margin-bottom: 20px;
    text-align: left;
}

.bar {
    height: 20px;
    background: #ff6a00;
    margin: 5px 0;
}
</style>

<script>

let studentName = "";

function showPage(id) {
    document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function submitForm(event) {
    event.preventDefault();

    studentName = document.getElementById("name").value;

    alert("Registration Successful!");

    document.getElementById("welcome").innerText = "Welcome, " + studentName;

    showPage('branchPage');
}

function showBranch(branch) {
    showPage('details');

    const data = {

IT: `
<h3>Overview</h3>
Information Technology focuses on software and cybersecurity.

<h3>Total Seats</h3>
150

<h3>Placement</h3>
Average: 6 LPA

<h3>Placement Chart</h3>
TCS<div class="bar" style="width:90%"></div>
Infosys<div class="bar" style="width:80%"></div>
Wipro<div class="bar" style="width:70%"></div>
`,

CE: `
<h3>Overview</h3>
Computer Engineering focuses on AI and programming.

<h3>Total Seats</h3>
180

<h3>Placement</h3>
Average: 8 LPA

<h3>Placement Chart</h3>
TCS<div class="bar" style="width:85%"></div>
Infosys<div class="bar" style="width:75%"></div>
Startups<div class="bar" style="width:65%"></div>
`,

Mechanical: `
<h3>Overview</h3>
Mechanical Engineering deals with machines.

<h3>Total Seats</h3>
120

<h3>Placement</h3>
Average: 5 LPA

<h3>Placement Chart</h3>
Tata<div class="bar" style="width:80%"></div>
Mahindra<div class="bar" style="width:70%"></div>
`,

Civil: `
<h3>Overview</h3>
Civil Engineering deals with construction.

<h3>Total Seats</h3>
120

<h3>Placement</h3>
Average: 4 LPA

<h3>Placement Chart</h3>
L&T<div class="bar" style="width:75%"></div>
Govt<div class="bar" style="width:65%"></div>
`
};

    document.getElementById("branchTitle").innerText = branch;
    document.getElementById("branchDesc").innerHTML = data[branch];
}

</script>
</head>

<body onload="showPage('home')">

<nav>
<a href="#">DDU Portal</a>
</nav>

<section id="home">
<div class="container">

<h1>Student Registration</h1>

<form onsubmit="submitForm(event)">
<input type="text" id="name" placeholder="Full Name" required><br>
<input type="email" placeholder="Email" required><br>
<input type="submit" value="Register">
</form>

</div>
</section>

<section id="branchPage">
<div class="container">

<h1 id="welcome"></h1>

<div class="info-box">
<b>Dharmsinh Desai University</b><br>
Top engineering university with excellent placement.
</div>

<h2>Select Branch</h2>

<button onclick="showBranch('IT')">IT</button>
<button onclick="showBranch('CE')">CE</button>
<button onclick="showBranch('Mechanical')">Mechanical</button>
<button onclick="showBranch('Civil')">Civil</button>

</div>
</section>

<section id="details">
<div class="container">

<h1 id="branchTitle"></h1>
<div id="branchDesc" class="info-box"></div>

<button onclick="showPage('branchPage')">Back</button>

</div>
</section>

</body>
</html>
