<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DDU Info Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #2c3e50, #4ca1af);
}

nav {
    background: #1a1a1a;
    padding: 15px;
    text-align: center;
}

nav a {
    color: #fff;
    margin: 15px;
    text-decoration: none;
    font-weight: bold;
}

section { display: none; padding: 30px; }
.active { display: block; }

.container {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 85%;
    margin: auto;
    text-align: center;
}

input, select, textarea {
    padding: 10px;
    margin: 6px;
    width: 240px;
}

input[type="submit"] {
    background: #4ca1af;
    color: white;
    border: none;
    cursor: pointer;
}

button {
    padding: 10px 15px;
    margin: 10px;
    background: #2c3e50;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

<script>

// Page switch
function showPage(id) {
    document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// FORM SUBMIT → GO TO BRANCH PAGE
function submitForm(event) {
    event.preventDefault(); // stop reload
    alert("Registration Successful!");
    showPage('branchPage');
}

// SHOW BRANCH DETAILS
function showBranch(branch) {
    showPage('details');

    const data = {
        Civil: "Civil Engineering deals with construction, infrastructure, roads and bridges.",
        IT: "Information Technology focuses on software, AI, cloud computing, and cybersecurity. It plays a major role in modern industries.", 
        CE: "Computer Engineering focuses on programming, system design, and advanced computing technologies.",
        ICT: "ICT combines communication technologies with IT including networking and data systems.",
        Chemical: "Chemical Engineering focuses on industrial processes, chemical production and manufacturing.",
        Mechanical: "Mechanical Engineering deals with machines, robotics, thermodynamics and manufacturing systems.",
        Electrical: "Electrical Engineering focuses on power systems, circuits and electrical machines.",
        Electronics: "Electronics Engineering focuses on communication systems, embedded systems and devices."
    };

    document.getElementById("branchTitle").innerText = branch + " Engineering";
    document.getElementById("branchDesc").innerText = data[branch];
}

</script>
</head>

<body onload="showPage('home')">

<nav>
<a href="#" onclick="showPage('home')">Home</a>
</nav>

<!-- HOME (FORM) -->
<section id="home">
<div class="container">

<h1>DDU Student Registration</h1>

<form onsubmit="submitForm(event)">
<input type="text" placeholder="Full Name" required><br>
<input type="text" placeholder="Father's Name" required><br>
<input type="date" required><br>

<select required>
<option>Gender</option>
<option>Male</option>
<option>Female</option>
</select><br>

<input type="email" placeholder="Email" required><br>
<input type="tel" placeholder="Mobile Number" required><br>

<textarea placeholder="Address" required></textarea><br>

<input type="submit" value="Submit Registration">
</form>

</div>
</section>

<!-- BRANCH PAGE -->
<section id="branchPage">
<div class="container">

<h1>Select Your Branch</h1>

<button onclick="showBranch('Civil')">Civil</button>
<button onclick="showBranch('IT')">IT</button>
<button onclick="showBranch('CE')">CE</button>
<button onclick="showBranch('ICT')">ICT</button>
<button onclick="showBranch('Chemical')">Chemical</button>
<button onclick="showBranch('Mechanical')">Mechanical</button>
<button onclick="showBranch('Electrical')">Electrical</button>
<button onclick="showBranch('Electronics')">Electronics</button>

</div>
</section>

<!-- DETAILS -->
<section id="details">
<div class="container">

<h1 id="branchTitle"></h1>
<p id="branchDesc"></p>

<button onclick="showPage('branchPage')">⬅ Back</button>

</div>
</section>

</body>
</html>
