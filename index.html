<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DDU Admission Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* HEADER */
.header {
    background: #ff6a00;
    color: white;
    display: flex;
    align-items: center;
    padding: 10px 20px;
}

.header img {
    width: 70px;
    margin-right: 15px;
}

.header h1 {
    margin: 0;
    font-size: 22px;
}

/* NAVBAR */
nav {
    background: #333;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

section { display: none; padding: 30px; }
.active { display: block; }

.container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 85%;
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
    color: #ff6a00;
}

input, select, textarea {
    padding: 10px;
    margin: 6px;
    width: 240px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

input[type="submit"] {
    background: #ff6a00;
    color: white;
    border: none;
    cursor: pointer;
}

button {
    padding: 10px;
    margin: 5px;
    background: #ff6a00;
    color: white;
    border: none;
    cursor: pointer;
}

.info-box {
    background: #fff7f0;
    padding: 15px;
    border-left: 5px solid #ff6a00;
    margin-bottom: 20px;
}

.bar {
    height: 20px;
    background: #ff6a00;
    margin: 5px 0;
}
</style>

<script>

let studentName = "";

function showPage(id) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function submitForm(e) {
    e.preventDefault();
    studentName = document.getElementById("name").value;
    document.getElementById("welcome").innerText = "Welcome, " + studentName;
    showPage('branchPage');
}

function showBranch(branch) {
    showPage('details');

    const data = {

IT: `
<h3>Overview</h3>
Focuses on software, cybersecurity & cloud computing.

<h3>Seats</h3>
150

<h3>Placement</h3>
6 LPA Avg

TCS<div class="bar" style="width:90%"></div>
Infosys<div class="bar" style="width:80%"></div>
`,

CE: `
<h3>Overview</h3>
Programming, AI & system design.

<h3>Seats</h3>
180

<h3>Placement</h3>
8 LPA Avg
`,

ICT: `
<h3>Overview</h3>
Combination of IT & communication.

<h3>Seats</h3>
60
`,

Mechanical: `
<h3>Overview</h3>
Machines & manufacturing.

<h3>Seats</h3>
120
`,

Civil: `
<h3>Overview</h3>
Construction & infrastructure.

<h3>Seats</h3>
120
`,

Electrical: `
<h3>Overview</h3>
Power systems & circuits.

<h3>Seats</h3>
120
`,

Electronics: `
<h3>Overview</h3>
Communication & embedded systems.

<h3>Seats</h3>
60
`,

Chemical: `
<h3>Overview</h3>
Industrial chemical processes.

<h3>Seats</h3>
120
`
};

    document.getElementById("branchTitle").innerText = branch + " Engineering";
    document.getElementById("branchDesc").innerHTML = data[branch];
}

</script>
</head>

<body onload="showPage('home')">

<!-- HEADER -->
<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/en/6/6b/Dharmsinh_Desai_University_logo.png">
<h1>Dharmsinh Desai University - Admission Portal</h1>
</div>

<nav>
<a href="#" onclick="showPage('home')">Home</a>
</nav>

<!-- HOME -->
<section id="home">
<div class="container">

<h2>Student Registration Form</h2>

<form onsubmit="submitForm(event)">
<input type="text" id="name" placeholder="Full Name" required><br>
<input type="text" placeholder="Father Name" required><br>
<input type="date" required><br>

<select required>
<option>Gender</option>
<option>Male</option>
<option>Female</option>
</select><br>

<input type="email" placeholder="Email" required><br>
<input type="tel" placeholder="Mobile" required><br>

<textarea placeholder="Address"></textarea><br>

<select required>
<option>Select Branch</option>
<option>IT</option>
<option>CE</option>
<option>ICT</option>
<option>Mechanical</option>
<option>Civil</option>
<option>Electrical</option>
<option>Electronics</option>
<option>Chemical</option>
</select><br>

<input type="submit" value="Register">
</form>

</div>
</section>

<!-- BRANCH PAGE -->
<section id="branchPage">
<div class="container">

<h2 id="welcome"></h2>

<div class="info-box">
<b>About University:</b><br>
Dharmsinh Desai University (DDU), Nadiad is known for engineering excellence, research and placements.
</div>

<h2>Available Branches</h2>

<button onclick="showBranch('IT')">IT</button>
<button onclick="showBranch('CE')">CE</button>
<button onclick="showBranch('ICT')">ICT</button>
<button onclick="showBranch('Mechanical')">Mechanical</button>
<button onclick="showBranch('Civil')">Civil</button>
<button onclick="showBranch('Electrical')">Electrical</button>
<button onclick="showBranch('Electronics')">Electronics</button>
<button onclick="showBranch('Chemical')">Chemical</button>

</div>
</section>

<!-- DETAILS -->
<section id="details">
<div class="container">

<h2 id="branchTitle"></h2>
<div id="branchDesc" class="info-box"></div>

<button onclick="showPage('branchPage')">⬅ Back</button>

</div>
</section>

</body>
</html>
